services:
  - type: web
    name: devops-advanced-backend
    env: node
    plan: free
    region: frankfurt
    # NODE_ENV=production omits devDependencies; TypeScript + @types/* are required to build.
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm install --omit=dev && npm start
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true
    healthCheckPath: /health

databases:
  - name: devops-advanced-postgres
    plan: free

